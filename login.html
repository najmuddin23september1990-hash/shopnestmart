<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Shop Nest By Najmuddin Bagh Wala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="shop-nest-logo-compact.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <a class="brand-lockup login-logo" href="index.html" aria-label="Shop Nest By Najmuddin Bagh Wala home">
        <img class="brand-logo large" src="shop-nest-logo.svg" alt="Shop Nest By Najmuddin Bagh Wala">
      </a>
      <div>
        <p class="eyebrow">Admin login</p>
        <h1>Sign in to manage your store.</h1>
      </div>
      <form id="loginForm">
        <label>
          Password
          <input type="password" name="password" placeholder="Enter admin password" required>
        </label>
        <button class="button primary" type="submit">Login</button>
        <p class="form-note" id="loginNote" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
